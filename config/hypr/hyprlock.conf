# ============================================================================
# Hyprlock Configuration — 1366x768
# ============================================================================
source = $HOME/.config/hypr/extra/hyprlock-colors.conf

# ----------------------------------------------------------------------------
# Background
# ----------------------------------------------------------------------------
background {
    monitor =
    path = $background_image
    color = $background
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ----------------------------------------------------------------------------
# Dimming Overlay
# ----------------------------------------------------------------------------
shape {
    monitor =
    size = 4000, 4000
    color = rgba(0, 0, 0, 0.35)
    rounding = 0
    border_size = 0
    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------
general {
    ignore_empty_input = true
    hide_cursor = false
}

# ----------------------------------------------------------------------------
# Animations
# ----------------------------------------------------------------------------
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# ----------------------------------------------------------------------------
# Clock — parte superior, centrado
# ----------------------------------------------------------------------------
label {
    monitor =
    text = 󰌾 
    color = $primary
    font_size = 24
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 265
    halign = center
    valign = center
    zindex = 1
}
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 80
    font_family = JetBrainsMono Nerd Font Mono Bold
    position = 0, 180
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = $primary
    font_size = 22
    font_family = JetBrainsMono Nerd Font Mono Bold
    position = 0, 90
    halign = center
    valign = center
    zindex = 1
}

# ----------------------------------------------------------------------------
# Avatar + Usuario — centro
# ----------------------------------------------------------------------------
image {
    monitor =
    path = $HOME/Pictures/user.jpg
    border_color = $primary
    border_size = 3
    size = 90
    rounding = -1
    rotate = 0
    reload_time = -1
    position = 0, 10
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = hi, $USER
    color = $text_color
    font_size = 13
    font_family = JetBrainsMono Nerd Font Mono Bold Italic
    position = 0, -65
    halign = center
    valign = center
    zindex = 1
}

# ----------------------------------------------------------------------------
# Password Input
# ----------------------------------------------------------------------------
input-field {
    monitor =
    size = 220, 48
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $primary
    inner_color = $entry_background_color
    font_color = $text_color
    check_color = $primary
    fail_color = rgb(204, 36, 29)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Mono Italic
    placeholder_text = <i>enter password</i>
    hide_input = false
    position = 0, -110
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = $LAYOUT[us,ua,ru]
    font_size = 12
    color = $text_color
    font_family = JetBrainsMono Nerd Font Mono Bold
    onclick = hyprctl switchxkblayout all next
    position = 0, -155
    halign = center
    valign = center
    zindex = 1
}

# ============================================================================
# Music Player Widget — centrado abajo
# ============================================================================
# Player Background Box
shape {
    monitor =
    color = $entry_background_color
    size = 420, 120
    rounding = 10
    border_size = 2
    border_color = $primary
    position = 0, 10
    halign = center
    valign = bottom
    zindex = 1
}
# Album Art
image {
    monitor =
    path = $HOME/.config/hypr/scripts/music.webp
    size = 80
    rounding = 5
    border_size = 0
    border_color = $primary
    rotate = 0
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/hyprlock-music.sh --art
    position = -155, 34
    halign = center
    valign = bottom
    zindex = 2
}
# Título
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = $text_color
    font_size = 13
    font_family = JetBrainsMono Nerd Font Mono Heavy
    position = 30, 100
    halign = center
    valign = bottom
    zindex = 2
}
# Artista
label {
    monitor =
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = $text_color
    font_size = 11
    font_family = JetBrainsMono Nerd Font Mono Semibold
    position = 30, 82
    halign = center
    valign = bottom
    zindex = 2
}
# Player
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --player)"
    color = $text_color
    font_size = 11
    font_family = JetBrainsMono Nerd Font Mono Bold
    position = 155, 15
    halign = center
    valign = bottom
    zindex = 2
}
# Tiempo actual
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --position)"
    color = $text_color
    font_size = 10
    font_family = JetBrainsMono Nerd Font Mono
    position = -95, 55
    halign = center
    valign = bottom
    zindex = 2
}
# Tiempo total
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --length)"
    color = $text_color
    font_size = 10
    font_family = JetBrainsMono Nerd Font Mono
    position = 155, 55
    halign = center
    valign = bottom
    zindex = 2
}
# Barra de progreso
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --progress-bar
    color = $primary
    font_size = 11
    font_family = JetBrainsMono Nerd Font Mono
    position = 30, 55
    halign = center
    valign = bottom
    zindex = 2
}
# Anterior
label {
    monitor =
    text = 󰒮
    color = $text_color
    font_size = 22
    onclick = playerctl previous
    position = -10, 20
    halign = center
    valign = bottom
    zindex = 2
}
# Play/Pause
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --status
    color = $text_color
    font_size = 22
    onclick = playerctl play-pause
    position = 30, 20
    halign = center
    valign = bottom
    zindex = 2
}
# Siguiente
label {
    monitor =
    text = 󰒭
    color = $text_color
    font_size = 22
    onclick = playerctl next
    position = 70, 20
    halign = center
    valign = bottom
    zindex = 2
}
